<div class="filter-tabs" id="filterTabs">

</div>

<div class="buildings-grid" id="gridView"></div>

<div class="buildings-list"
id="listView" style="display:none;"></div>

<div class="empty-state" id="emptyState">

<div class="empty-icon">🔍</div>
